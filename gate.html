<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>~||-_^+*.</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <style>
        @font-face {
            font-family: 'ABC Diatype Rounded';
            src: url('fonts/ABCDiatypeRoundedVariable-Trial.woff2') format('woff2');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow-x: hidden;
            max-width: 100vw;
        }

        body {
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
            color: #1a1a1a;
            min-height: 100dvh;
            touch-action: manipulation;
        }

        /* --- znaczki (ported from index.html) --- */
        .star-fog {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .star-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            pointer-events: none;
        }
        .star-particle {
            position: absolute;
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            color: rgb(150, 130, 220);
            font-size: 0.85rem;
            font-weight: 300;
            user-select: none;
            pointer-events: auto;
            opacity: 0;
            transform: scale(0.2) translate(calc(var(--appear-x,0px)*2), calc(var(--appear-y,0px)*2));
            transition: opacity 1s ease-out, transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: particleSway 22s ease-in-out infinite alternate;
        }
        .star-particle.typing-in {
            opacity: 0.5;
            transform: scale(1) translate(0, 0);
        }
        @keyframes particleSway {
            0%   { transform: translate3d(0,0,0); }
            25%  { transform: translate3d(3px,-4px,0); }
            50%  { transform: translate3d(0,-6px,0); }
            75%  { transform: translate3d(-3px,-4px,0); }
            100% { transform: translate3d(0,0,0); }
        }

        /* --- gate layout --- */
        #gate {
            position: relative;
            z-index: 1;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem calc(2rem + env(safe-area-inset-bottom, 0));
            text-align: center;
        }

        /* --- chat messages --- */
        #chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.55rem;
            margin-bottom: 2.2rem;
            min-height: 5rem;
        }

        .gate-msg {
            font-size: clamp(1rem, 3vw, 1.35rem);
            font-weight: 300;
            letter-spacing: 0.02em;
            color: #1a1a1a;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .gate-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* typing cursor */
        #cursor {
            font-size: clamp(1rem, 3vw, 1.35rem);
            font-weight: 300;
            color: rgb(150, 130, 220);
            opacity: 0;
            transition: opacity 0.15s;
            min-height: 1.4em;
        }
        #cursor.show {
            opacity: 1;
            animation: blink 0.9s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        /* --- actions --- */
        #actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        #actions.show {
            opacity: 1;
            transform: translateY(0);
        }

        .gate-btn {
            display: inline-flex;
            align-items: center;
            background: transparent;
            border: 0;
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #1a1a1a;
            cursor: pointer;
            padding: 12px 16px;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.2s ease;
        }
        .gate-btn:hover { opacity: 0.6; }

        .gate-btn::before,
        .gate-btn::after {
            content: '|';
            font-weight: 300;
            color: rgba(0,0,0,0.3);
            font-size: 0.75em;
            margin: 0 0.45em;
        }

        .gate-btn.muted {
            opacity: 0.45;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
        }
        .gate-btn.muted:hover { opacity: 0.25; }

        /* --- camera --- */
        #camera-area {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10;
            background: #000;
            overflow: hidden;
        }
        #camera-area.active { display: block; }

        #camera-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #camera-canvas { display: none; }

        /* UI layer above video */
        #camera-ui {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #camera-vignette { display: none; }

        /* scanning frame */
        #camera-frame {
            position: relative;
            width: min(72vw, 280px);
            aspect-ratio: 1;
            z-index: 1;
        }

        /* corner brackets */
        .cam-corner {
            position: absolute;
            width: 28px;
            height: 28px;
            border-color: rgb(150, 130, 220);
            border-style: solid;
            animation: cornerPulse 2s ease-in-out infinite;
            box-shadow: none;
        }
        .cam-corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .cam-corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; animation-delay: 0.5s; }
        .cam-corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; animation-delay: 1s; }
        .cam-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; animation-delay: 1.5s; }

        @keyframes cornerPulse {
            0%, 100% { opacity: 0.6; }
            50%       { opacity: 1; }
        }

        #scan-line { display: none; }

        /* znaczki wokół kamery */
        .cam-znaczek {
            position: absolute;
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 300;
            color: rgb(150, 130, 220);
            pointer-events: none;
            animation: camFloat 0s ease-in-out infinite alternate;
        }
        @keyframes camFloat {
            0%   { opacity: 0.25; transform: translateY(0); }
            100% { opacity: 0.65; transform: translateY(-6px); }
        }

        /* hint text */
        #camera-hint {
            position: absolute;
            bottom: calc(5rem + env(safe-area-inset-bottom, 0));
            left: 50%; transform: translateX(-50%);
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            color: rgba(255,255,255,0.45);
            letter-spacing: 0.06em;
            white-space: nowrap;
            pointer-events: none;
        }

        /* success flash */
        #camera-frame.found .cam-corner {
            border-color: #fff;
            animation: none;
            opacity: 1;
            box-shadow: 0 0 16px rgba(255,255,255,0.8);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #camera-frame.found #scan-line { display: none; }

        #camera-cancel {
            position: absolute;
            bottom: max(1.5rem, env(safe-area-inset-bottom, 0));
            left: 50%; transform: translateX(-50%);
            pointer-events: auto;
            background: transparent;
            border: 0;
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            letter-spacing: 0.08em;
            padding: 14px 20px;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.2s;
        }
        #camera-cancel:hover { color: rgba(255,255,255,0.8); }

        @media (max-width: 480px) {
            #gate { padding: 1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom, 0)); }
        }
    </style>
</head>
<body>

<div class="star-fog" aria-hidden="true">
    <div class="star-container" id="starContainer"></div>
</div>

<div id="gate">
    <div id="chat">
        <div id="cursor">|</div>
    </div>
    <div id="actions"></div>
</div>

<!-- camera overlay -->
<div id="camera-area">
    <video id="camera-video" playsinline autoplay muted></video>
    <canvas id="camera-canvas"></canvas>
    <div id="camera-ui">
        <div id="camera-vignette"></div>
        <div id="camera-frame">
            <div class="cam-corner tl"></div>
            <div class="cam-corner tr"></div>
            <div class="cam-corner bl"></div>
            <div class="cam-corner br"></div>
            <div id="scan-line"></div>
        </div>
        <div id="camera-znaczki"></div>
        <div id="camera-hint">skieruj kamerę na kod</div>
    </div>
    <button id="camera-cancel">anuluj</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="/gate-config.js"></script>
<script src="/gate.js"></script>
</body>
</html>
