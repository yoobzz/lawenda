<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>~||-_^+*.</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <style>
        @font-face {
            font-family: 'ABC Diatype Rounded';
            src: url('fonts/ABCDiatypeRoundedVariable-Trial.woff2') format('woff2');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow-x: hidden;
            max-width: 100vw;
        }

        body {
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
            color: #1a1a1a;
            min-height: 100dvh;
            touch-action: manipulation;
        }

        /* --- znaczki (ported from index.html) --- */
        .star-fog {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .star-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            pointer-events: none;
        }
        .star-particle {
            position: absolute;
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            color: rgb(150, 130, 220);
            font-size: 0.85rem;
            font-weight: 300;
            user-select: none;
            pointer-events: auto;
            opacity: 0;
            transform: scale(0.2) translate(calc(var(--appear-x,0px)*2), calc(var(--appear-y,0px)*2));
            transition: opacity 1s ease-out, transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: particleSway 22s ease-in-out infinite alternate;
        }
        .star-particle.typing-in {
            opacity: 0.5;
            transform: scale(1) translate(0, 0);
        }
        @keyframes particleSway {
            0%   { transform: translate3d(0,0,0); }
            25%  { transform: translate3d(3px,-4px,0); }
            50%  { transform: translate3d(0,-6px,0); }
            75%  { transform: translate3d(-3px,-4px,0); }
            100% { transform: translate3d(0,0,0); }
        }

        /* --- gate layout --- */
        #gate {
            position: relative;
            z-index: 1;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem calc(2rem + env(safe-area-inset-bottom, 0));
            text-align: center;
        }

        /* --- chat messages --- */
        #chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.55rem;
            margin-bottom: 2.2rem;
            min-height: 5rem;
        }

        .gate-msg {
            font-size: clamp(1rem, 3vw, 1.35rem);
            font-weight: 300;
            letter-spacing: 0.02em;
            color: #1a1a1a;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .gate-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* typing cursor */
        #cursor {
            font-size: clamp(1rem, 3vw, 1.35rem);
            font-weight: 300;
            color: rgb(150, 130, 220);
            opacity: 0;
            transition: opacity 0.15s;
            animation: blink 0.9s step-end infinite;
            min-height: 1.4em;
        }
        #cursor.show { opacity: 1; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        /* --- actions --- */
        #actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        #actions.show {
            opacity: 1;
            transform: translateY(0);
        }

        .gate-btn {
            display: inline-flex;
            align-items: center;
            background: transparent;
            border: 0;
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #1a1a1a;
            cursor: pointer;
            padding: 12px 16px;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.2s ease;
        }
        .gate-btn:hover { opacity: 0.6; }

        .gate-btn::before,
        .gate-btn::after {
            content: '|';
            font-weight: 300;
            color: rgba(0,0,0,0.3);
            font-size: 0.75em;
            margin: 0 0.45em;
        }

        .gate-btn.muted {
            opacity: 0.45;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
        }
        .gate-btn.muted:hover { opacity: 0.25; }

        /* --- camera --- */
        #camera-area {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10;
            background: #000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #camera-area.active { display: flex; }

        #camera-video {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1;
            object-fit: cover;
        }
        #camera-canvas { display: none; }

        #camera-frame {
            position: absolute;
            width: min(72vw, 260px);
            aspect-ratio: 1;
            border: 2px solid rgba(150, 130, 220, 0.7);
            pointer-events: none;
        }

        #camera-cancel {
            margin-top: 1.5rem;
            background: transparent;
            border: 0;
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            letter-spacing: 0.08em;
            padding: 10px 16px;
        }
        #camera-cancel:hover { color: #fff; }

        @media (max-width: 480px) {
            #gate { padding: 1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom, 0)); }
        }
    </style>
</head>
<body>

<div class="star-fog" aria-hidden="true">
    <div class="star-container" id="starContainer"></div>
</div>

<div id="gate">
    <div id="chat">
        <div id="cursor">|</div>
    </div>
    <div id="actions"></div>
</div>

<!-- camera overlay -->
<div id="camera-area">
    <video id="camera-video" playsinline autoplay muted></video>
    <canvas id="camera-canvas"></canvas>
    <div id="camera-frame"></div>
    <button id="camera-cancel">anuluj</button>
</div>

<script src="gate-config.js"></script>
<script src="gate.js"></script>
</body>
</html>
