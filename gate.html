<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>~||-_^+*.</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <style>
        @font-face {
            font-family: 'ABC Diatype Rounded';
            src: url('fonts/ABCDiatypeRoundedVariable-Trial.woff2') format('woff2');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; max-width: 100vw; }

        body {
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
            color: #1a1a1a;
            min-height: 100dvh;
            touch-action: manipulation;
        }

        .star-fog {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .star-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            pointer-events: none;
        }

        .star-particle {
            position: absolute;
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            color: rgb(150, 130, 220);
            font-size: 0.85rem;
            font-weight: 300;
            user-select: none;
            pointer-events: auto;
            opacity: 0;
            transform: scale(0.2) translate(calc(var(--appear-x,0px)*2), calc(var(--appear-y,0px)*2));
            transition: opacity 1s ease-out, transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: particleSway 22s ease-in-out infinite alternate;
        }

        .star-particle.typing-in {
            opacity: 0.5;
            transform: scale(1) translate(0, 0);
        }

        @keyframes particleSway {
            0%   { transform: translate3d(0, 0, 0); }
            25%  { transform: translate3d(3px, -4px, 0); }
            50%  { transform: translate3d(0, -6px, 0); }
            75%  { transform: translate3d(-3px, -4px, 0); }
            100% { transform: translate3d(0, 0, 0); }
        }

        #gate {
            position: relative;
            z-index: 2;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem calc(2rem + env(safe-area-inset-bottom, 0));
        }

        #chat {
            width: min(640px, 92vw);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 1.6rem;
        }

        .chat-bubble {
            max-width: 92%;
            padding: 0.1rem 0 0.1rem 1rem;
            border-left: 1px solid rgba(150, 130, 220, 0.28);
            font-size: clamp(0.93rem, 2.6vw, 1.05rem);
            line-height: 1.65;
            font-weight: 300;
            color: #1a1a1a;
            letter-spacing: 0.012em;
            opacity: 0;
            transform: translateY(8px);
        }

        .chat-bubble.show {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.42s ease, transform 0.42s ease;
        }

        .typing-bubble {
            display: flex;
            gap: 0.45em;
            padding: 0.1rem 0 0.1rem 1rem;
            opacity: 0;
            transform: translateY(4px);
        }

        .typing-bubble.show {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .typing-dot {
            color: rgb(150, 130, 220);
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.25;
            animation: dotPulse 1.1s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.22s; }
        .typing-dot:nth-child(3) { animation-delay: 0.44s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.85; }
        }

        #actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.45rem;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #actions.show {
            opacity: 1;
            transform: translateY(0);
        }

        .gate-btn {
            background: transparent;
            border: 0;
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            font-size: clamp(0.9rem, 2.6vw, 1rem);
            font-weight: 320;
            letter-spacing: 0.06em;
            color: #1c1c1c;
            cursor: pointer;
            padding: 10px 14px;
            transition: opacity 0.2s ease;
        }

        .gate-btn:hover { opacity: 0.62; }

        .gate-btn.soft {
            color: rgba(20, 20, 20, 0.56);
            font-size: clamp(0.84rem, 2.4vw, 0.9rem);
        }

        .manual-row {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            margin-top: 0.2rem;
        }

        .manual-row input {
            width: 150px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            padding: 0.56rem 0.7rem;
            font-family: inherit;
            font-size: 0.95rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-align: center;
            color: #1a1a1a;
        }

        .manual-row input:focus {
            outline: none;
            border-color: rgba(150, 130, 220, 0.55);
        }

        .manual-error {
            margin-top: 0.4rem;
            font-size: 0.83rem;
            color: rgba(145, 55, 55, 0.95);
            letter-spacing: 0.03em;
        }

        #camera-area {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 20;
            background: #060606;
            overflow: hidden;
        }

        #camera-area.active { display: block; }

        #camera-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.7) contrast(1.15) brightness(0.9);
        }

        #camera-canvas { display: none; }

        #camera-ui {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        #camera-frame {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(76vw, 300px);
            aspect-ratio: 1;
        }

        #scan-symbols {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(74vw, 295px);
            height: min(74vw, 295px);
            pointer-events: none;
        }

        .scan-symbol {
            position: absolute;
            font-family: 'ABC Diatype Rounded', 'Inter', sans-serif;
            color: rgb(150, 130, 220);
            font-size: 0.78rem;
            font-weight: 300;
            user-select: none;
            pointer-events: none;
            opacity: 0.18;
            animation: borderPulse 2.8s ease-in-out infinite;
            animation-delay: var(--pd, 0s);
        }

        @keyframes borderPulse {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.72; }
        }

        #manual-scan-hint {
            position: absolute;
            left: 50%;
            bottom: calc(4.4rem + env(safe-area-inset-bottom, 0));
            transform: translateX(-50%);
            pointer-events: auto;
            background: transparent;
            border: 0;
            font-family: inherit;
            font-size: 0.84rem;
            color: rgba(255, 255, 255, 0.58);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        #manual-scan-hint.show { opacity: 1; }

        #camera-cancel {
            position: absolute;
            left: 50%;
            bottom: max(1.6rem, env(safe-area-inset-bottom, 0));
            transform: translateX(-50%);
            pointer-events: auto;
            background: transparent;
            border: 0;
            font-family: inherit;
            font-size: 0.83rem;
            letter-spacing: 0.04em;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            padding: 8px 12px;
            transition: color 0.2s ease;
        }

        #camera-cancel:hover { color: rgba(255, 255, 255, 0.86); }

        #scan-flash {
            position: absolute;
            inset: 0;
            background: rgba(120, 100, 200, 0.55);
            opacity: 0;
            pointer-events: none;
            z-index: 3;
        }

        #camera-canvas {
            display: none;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.7) contrast(1.15) brightness(0.9);
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="star-fog" aria-hidden="true">
    <div class="star-container" id="starContainer"></div>
</div>

<div id="gate">
    <div id="chat"></div>
    <div id="actions"></div>
</div>

<div id="camera-area">
    <video id="camera-video" playsinline autoplay muted></video>
    <canvas id="camera-canvas"></canvas>
    <div id="camera-ui">
        <div id="scan-symbols"></div>
        <button id="manual-scan-hint" type="button">wpisz kod ręcznie</button>
        <div id="scan-flash"></div>
    </div>
    <button id="camera-cancel" type="button">anuluj</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js" integrity="sha384-9Q0jWoineiIq95JeIyBsNV90KKLfDsbkj29k/YFxf76a2JwkHDYkMuSbNGN6XJfV" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" integrity="sha384-g4NTh/Iv5PPU4xPyhEWqPcwtNXOvdaDI8LLnyYfyNZOjKJeYQyjzQ9X5275eBjpt" crossorigin="anonymous"></script>
<script src="/gate-config.js"></script>
<script src="/gate.js"></script>
</body>
</html>
