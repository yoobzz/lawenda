    <script src="audio.js"></script>
    <script>
    (function() {
        const SYMS = ['~', '|', '|', '-', '_', '^', '+', '*', '.'];
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // ── Scatter symbols per section ────────────────────────────────
        const scatterConfig = {
            hero:    { count: 20, opacity: 0.05, color: '#fff' },
            pisze:   { count: 14, opacity: 0.04, color: '#111' },
            lawenda: { count: 16, opacity: 0.07, color: '#fff' },
            ksiazka: { count: 14, opacity: 0.03, color: '#111' },
        };

        document.querySelectorAll('.scatter-words').forEach(container => {
            const sectionName = container.parentElement.dataset.section;
            const cfg = scatterConfig[sectionName];
            if (!cfg) return;

            for (let i = 0; i < cfg.count; i++) {
                const s = document.createElement('span');
                s.textContent = SYMS[Math.floor(Math.random() * SYMS.length)];
                s.style.left = (5 + Math.random() * 85) + '%';
                s.style.top = (5 + Math.random() * 85) + '%';
                const size = 14 + Math.random() * 36;
                s.style.fontSize = size + 'px';
                s.style.color = cfg.color;
                const rotate = (Math.random() - 0.5) * 40;
                s.style.transform = 'rotate(' + rotate + 'deg) translateY(20px)';
                s._rotate = rotate;
                // ambient drift properties
                s.style.setProperty('--float-y', (-3 - Math.random() * 9) + 'px');
                s.style.setProperty('--float-dur', (6 + Math.random() * 10) + 's');
                container.appendChild(s);
            }
        });

        // ── Intersection Observer for scroll-triggered reveals ───────
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                const section = entry.target;
                const sectionName = section.dataset.section;

                // reveal scatter words with staggered timing
                section.querySelectorAll('.scatter-words span').forEach((s, i) => {
                    const delay = i * 90 + Math.random() * 40;
                    setTimeout(() => {
                        s.classList.add('visible');
                        s.style.transform = 'rotate(' + s._rotate + 'deg) translateY(0)';
                        // start ambient float after reveal transition completes
                        if (!prefersReducedMotion) {
                            setTimeout(() => s.classList.add('floating'), 2000);
                        }
                    }, delay);
                });

                // reveal main content
                if (sectionName === 'hero') {
                    const name = document.getElementById('heroName');
                    if (!name.dataset.animated) {
                        name.dataset.animated = '1';
                        typewriteHero();
                    }
                    observer.unobserve(section);
                }
                else if (sectionName === 'pisze') {
                    if (!section.dataset.animated) {
                        section.dataset.animated = '1';
                        animatePisze();
                    }
                    observer.unobserve(section);
                }
                else if (sectionName === 'lawenda') {
                    const kickerEl = section.querySelector('.lawenda-kicker');
                    const hugeEl = section.querySelector('.lawenda-huge');
                    const descEl = section.querySelector('.lawenda-desc');
                    if (!hugeEl.dataset.looping) {
                        hugeEl.dataset.looping = '1';
                        if (!descEl.dataset.fullText) {
                            descEl.dataset.fullText = descEl.textContent.trim();
                        }
                        descEl.textContent = '';
                        if (kickerEl && !kickerEl.dataset.animated) {
                            kickerEl.dataset.animated = '1';
                            typewriteKicker(kickerEl, kickerEl.textContent.trim(), () => {
                                setTimeout(() => {
                                    hugeEl.classList.add('visible');
                                    lawendaDecryptLoop(hugeEl, () => {
                                        typewriteLawendaDesc(descEl);
                                    });
                                }, 300);
                            });
                        }
                    }
                    observer.unobserve(section);
                }
                else if (sectionName === 'ksiazka') {
                    section.querySelectorAll('.ksiazka-line').forEach((el, i) => {
                        setTimeout(() => el.classList.add('visible'), i * 500);
                    });
                    if (!section.dataset.symLoop) {
                        section.dataset.symLoop = '1';
                        updateKsiazkaSymbols();
                        section._symInterval = setInterval(updateKsiazkaSymbols, 180);
                    }
                    observer.unobserve(section);
                }
                else if (sectionName === 'support') {
                    if (!section.dataset.animated) {
                        section.dataset.animated = '1';
                        animateSupport();
                    }
                    observer.unobserve(section);
                }
                else if (sectionName === 'nav') {
                    section.querySelectorAll('.nav-row').forEach(el => el.classList.add('visible'));
                    const collabBtn = document.getElementById('navCollab');
                    if (collabBtn) collabBtn.classList.add('visible');
                    observer.unobserve(section);
                }
            });
        }, { threshold: 0.25 });

        document.querySelectorAll('.section').forEach(s => observer.observe(s));

        // ── Decrypt reveal (from poems) ──────────────────────────────
        const SYMS_DECRYPT = ['_', '-', '~', '"', '|', ',', '*', '^', ':', ';', '.', '+', '=', '`', "'", '!'];
        const LIVE_KSIAZKA_SYMS = ['_', '-', '~', '"', '|', ',', '*', '^', ':', ';', '.', '+', '=', '`', "'", '!'];

        function randomSymChunk(len) {
            let out = '';
            for (let i = 0; i < len; i++) {
                out += LIVE_KSIAZKA_SYMS[Math.floor(Math.random() * LIVE_KSIAZKA_SYMS.length)];
            }
            return out;
        }

        function updateKsiazkaSymbols() {
            document.querySelectorAll('.section-ksiazka .ksiazka-sym').forEach(el => {
                const n = Number(el.dataset.count) || 3;
                const side = el.dataset.side || 'left';
                const chunk = randomSymChunk(n);
                el.textContent = chunk;
            });
        }

        function decryptReveal(el) {
            const text = el.textContent;
            const chars = [];
            let html = '';
            for (let i = 0; i < text.length; i++) {
                if (/\s/.test(text[i])) {
                    html += text[i];
                } else {
                    html += '<span class="dc">' + SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)] + '</span>';
                    chars.push({ idx: i, ch: text[i] });
                }
            }
            el.innerHTML = html;
            const spans = Array.from(el.querySelectorAll('.dc'));

            // lock widths to final chars
            spans.forEach((s, i) => { s.textContent = chars[i].ch; });
            void el.offsetWidth;
            spans.forEach((s, i) => {
                const w = s.getBoundingClientRect().width;
                s.style.width = w + 'px';
                s.textContent = SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)];
            });

            // shuffle order
            const order = spans.map((_, i) => i);
            for (let k = order.length - 1; k > 0; k--) {
                const j = Math.floor(Math.random() * (k + 1));
                [order[k], order[j]] = [order[j], order[k]];
            }

            const timeouts = [];
            let t = 0;
            order.forEach(si => {
                t += 1 + Math.random() * 7;
                const start = t;
                const cycles = 1 + Math.floor(Math.random() * 5);
                const stepMs = 35 + Math.random() * 75;
                for (let c = 0; c < cycles; c++) {
                    timeouts.push(setTimeout(() => {
                        spans[si].textContent = SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)];
                    }, start + c * stepMs));
                }
                timeouts.push(setTimeout(() => {
                    spans[si].textContent = chars[si].ch;
                }, start + cycles * stepMs));
            });
        }

        // ── Typewrite hero ───────────────────────────────────────────
        function humanDelay(char) {
            let d = 30 + Math.random() * 40;
            if ('.!?'.includes(char)) d += 120 + Math.random() * 150;
            else if (',;:'.includes(char)) d += 60 + Math.random() * 60;
            else if (char === ' ') d += 15 + Math.random() * 50;
            // random micro-pauses — hesitation
            if (Math.random() < 0.1) d += 80 + Math.random() * 150;
            // rare long pause — like thinking
            if (Math.random() < 0.04) d += 200 + Math.random() * 250;
            return d;
        }

        function decryptRevealSlow(el, onDone) {
            const text = el.textContent;
            const chars = [];
            let html = '';
            for (let i = 0; i < text.length; i++) {
                if (/\s/.test(text[i])) {
                    html += text[i];
                } else {
                    html += '<span class="dc">' + SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)] + '</span>';
                    chars.push({ idx: i, ch: text[i] });
                }
            }
            el.innerHTML = html;
            const spans = Array.from(el.querySelectorAll('.dc'));

            spans.forEach((s, i) => { s.textContent = chars[i].ch; });
            void el.offsetWidth;
            spans.forEach((s, i) => {
                const w = s.getBoundingClientRect().width;
                s.style.width = w + 'px';
                s.textContent = SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)];
            });

            // find the exclamation mark index (last char "!")
            const exclIndex = chars.findIndex(c => c.ch === '!');

            // shuffle order but exclude "!" — it goes last
            const order = spans.map((_, i) => i).filter(i => i !== exclIndex);
            for (let k = order.length - 1; k > 0; k--) {
                const j = Math.floor(Math.random() * (k + 1));
                [order[k], order[j]] = [order[j], order[k]];
            }

            let t = 0;
            let maxEnd = 0;
            // decrypt all chars except "!" — fast timing
            order.forEach(si => {
                t += 8 + Math.random() * 25;
                const start = t;
                const cycles = 3 + Math.floor(Math.random() * 5);
                const stepMs = 35 + Math.random() * 55;
                for (let c = 0; c < cycles; c++) {
                    setTimeout(() => {
                        spans[si].textContent = SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)];
                    }, start + c * stepMs);
                }
                const endTime = start + cycles * stepMs;
                if (endTime > maxEnd) maxEnd = endTime;
                setTimeout(() => {
                    spans[si].textContent = chars[si].ch;
                }, endTime);
            });

            // "!" decrypts last — starts when others finish, decelerates
            if (exclIndex !== -1) {
                const exclStart = maxEnd + 80;
                const exclCycles = 4 + Math.floor(Math.random() * 3);
                let exclT = exclStart;
                for (let c = 0; c < exclCycles; c++) {
                    const progress = c / exclCycles;
                    const stepMs = 70 + progress * progress * 250;
                    setTimeout(() => {
                        spans[exclIndex].textContent = SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)];
                    }, exclT);
                    exclT += stepMs;
                }
                // final reveal
                setTimeout(() => {
                    spans[exclIndex].textContent = chars[exclIndex].ch;
                }, exclT);
                maxEnd = exclT;
            }

            setTimeout(() => {
                el.textContent = text;
                if (onDone) onDone();
            }, maxEnd + 100);
        }

        function typewriteHero() {
            const hejEl = document.getElementById('heroHej');
            const nameEl = document.getElementById('heroName');

            // Phase 1: decrypt "cześć!" with scale+blur reveal
            hejEl.classList.add('visible');
            hejEl.textContent = 'cześć!';
            decryptRevealSlow(hejEl, () => {
                document.querySelector('.hero-video').classList.add('visible');
                // Phase 2: brief pause + start tracking cursor
                setTimeout(() => {
                    // Phase 3: typewrite "jestem sta" then hesitation animation
                    nameEl.classList.add('visible');
                    const preText = 'jestem sta';
                    let ni = 0;
                    function typePre() {
                        ni++;
                        nameEl.innerHTML = preText.slice(0, ni) + '<span class="stas-cursor"></span>';
                        if (ni >= preText.length) {
                            // Phase 4: staś/stanisław hesitation
                            setTimeout(() => animateStasHesitation(nameEl, () => {}), 150);
                            return;
                        }
                        setTimeout(typePre, humanDelay(preText[ni]));
                    }
                    typePre();
                }, 500);
            });
        }

        // ── Staś/Stanisław hesitation ────────────────────────────────
        // staś → stanisław → staś → staś? —— stanisław -(pauza) -dopisanie "?" -dopisanie "????" —— staś — staś.
        function animateStasHesitation(el, onDone) {
            const base = 'jestem sta';
            const steps = [];
            function last() { return steps[steps.length - 1].text; }
            function typeStr(str, speed) {
                str.split('').forEach(ch => {
                    steps.push({ text: last() + ch, cursor: true, delay: speed || (50 + Math.random() * 55) });
                });
            }
            function deleteBack(to, speed) {
                let cur = last();
                while (cur.length > to.length) {
                    cur = cur.slice(0, -1);
                    steps.push({ text: cur, cursor: true, delay: speed || 30 });
                }
            }
            function pause(ms) {
                steps.push({ text: last(), cursor: true, delay: ms });
            }

            // 1. staś
            steps.push({ text: base + 'ś', cursor: true, delay: 50 });
            pause(300);

            // 2. → stanisław
            deleteBack(base, 20);
            pause(120);
            typeStr('nisław', 35);
            pause(250);

            // 3. → staś
            deleteBack(base, 18);
            pause(100);
            typeStr('ś', 35);
            pause(180);

            // 4. → staś?
            deleteBack(base, 18);
            pause(80);
            typeStr('ś?', 35);
            pause(600);

            // 5. —— stanisław
            deleteBack(base, 18);
            pause(150);
            typeStr('nisław', 30);
            pause(500);

            // 6. (pauza) dopisanie "?" potem "????"
            typeStr('?', 40);
            pause(250);
            typeStr('????', 55);
            pause(400);

            // 7. —— staś
            deleteBack(base, 18);
            pause(100);
            typeStr('ś', 35);
            pause(300);

            // 8. — staś.
            deleteBack(base, 18);
            pause(100);
            typeStr('ś.', 35);
            pause(600);

            // cursor off
            steps.push({ text: last(), cursor: false });

            let step = 0;
            function run() {
                if (step >= steps.length) { if (onDone) onDone(); return; }
                const s = steps[step];
                el.innerHTML = s.text + (s.cursor ? '<span class="stas-cursor"></span>' : '');
                step++;
                setTimeout(run, s.delay || 60);
            }
            run();
        }

        // ── Piszę wiersze... animation ────────────────────────────
        function animatePisze() {
            const cursor = '<span class="stas-cursor" style="background:#111"></span>';

            function typeInto(el, text, speed) {
                return new Promise(resolve => {
                    let i = 0;
                    el.classList.add('visible');
                    function step() {
                        if (i >= text.length) {
                            el.textContent = text;
                            resolve();
                            return;
                        }
                        i++;
                        el.innerHTML = text.slice(0, i) + cursor;
                        let d = speed || (18 + Math.random() * 22);
                        if (text[i - 1] === ' ') d += 8 + Math.random() * 15;
                        if (Math.random() < 0.04) d += 40 + Math.random() * 60;
                        setTimeout(step, d);
                    }
                    step();
                });
            }

            function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

            function typeFootnote(el, text, speed) {
                return new Promise(resolve => {
                    let i = 0;
                    el.classList.add('visible');
                    function step() {
                        if (i >= text.length) { el.textContent = text; resolve(); return; }
                        i++;
                        el.textContent = text.slice(0, i);
                        setTimeout(step, speed || (25 + Math.random() * 20));
                    }
                    step();
                });
            }

            async function run() {
                const l1 = document.getElementById('piszeLine1');
                const l2 = document.getElementById('piszeLine2');
                const l3 = document.getElementById('piszeLine3');
                const dot = document.getElementById('piszeDot');
                const foot = document.getElementById('piszeFootnote');

                // line 1: "piszę wiersze,"
                await typeInto(l1, 'piszę wiersze,', 25);

                // line 2: longer — slight pause before, slower
                await wait(600);
                await typeInto(l2, 'żeby nie zgubić siebie w sobie', 30);

                // line 3: short — quick
                await wait(400);
                await typeInto(l3, 'i w świecie', 22);

                // dot — pop in
                await wait(700);
                dot.classList.add('visible');
                dot.textContent = '.';

                // comma → asterisk on "piszę wiersze,"
                await wait(500);
                l1.innerHTML = 'piszę wiersze<span class="pisze-star">*</span>';

                // footnote typewrite
                await wait(400);
                await typeFootnote(foot, '*i nie tylko', 35);
            }

            run();
        }

        function typewriteKicker(el, text, onDone) {
            const cursor = '<span class="stas-cursor" style="background:#111"></span>';
            el.textContent = '';
            el.classList.add('visible');
            let i = 0;
            function step() {
                if (i >= text.length) {
                    el.textContent = text;
                    setTimeout(() => { if (onDone) onDone(); }, 400);
                    return;
                }
                i++;
                el.innerHTML = text.slice(0, i) + cursor;
                let d = 30 + Math.random() * 40;
                if (text[i - 1] === ' ') d += 15 + Math.random() * 25;
                if (text[i - 1] === ',') d += 80 + Math.random() * 60;
                setTimeout(step, d);
            }
            step();
        }

        function typewriteLawendaDesc(el) {
            const cursor = () => '<span class="stas-cursor" style="background:#111"></span>';
            function sliceToHtml(s) {
                return s
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/\n/g, '<br>');
            }
            const fullText = el.dataset.fullText || '';
            let i = 0;

            el.classList.add('visible');
            el.innerHTML = cursor();

            function step() {
                if (i >= fullText.length) {
                    el.textContent = fullText;
                    return;
                }
                i++;
                el.innerHTML = sliceToHtml(fullText.slice(0, i)) + cursor();

                let d = 28 + Math.random() * 35;
                if (fullText[i - 1] === ' ') d += 15 + Math.random() * 25;
                if (fullText[i - 1] === '\n') d += 250 + Math.random() * 200;
                if (fullText[i - 1] === ',') d += 120 + Math.random() * 100;
                else if ('.;:!?'.includes(fullText[i - 1])) d += 200 + Math.random() * 200;
                if (Math.random() < 0.06) d += 60 + Math.random() * 100;
                setTimeout(step, d);
            }

            setTimeout(step, 250);
        }

        // ── Support section animation ──────────────────────────────
        function animateSupport() {
            const section = document.querySelector('.section-support');
            const readEl = document.getElementById('supportRead');
            const helpEl = document.getElementById('supportHelp');

            // scatter big symbols across the section
            const SYMS_BG = ['"', '~', '|', '-', '_', '^', '+', '*', '.'];
            for (let s = 0; s < 25; s++) {
                const sym = document.createElement('span');
                sym.className = 'support-scatter-sym';
                sym.textContent = SYMS_BG[Math.floor(Math.random() * SYMS_BG.length)];
                sym.style.left = (5 + Math.random() * 85) + '%';
                sym.style.top = (5 + Math.random() * 85) + '%';
                sym.style.fontSize = (20 + Math.random() * 60) + 'px';
                sym.style.transform = 'rotate(' + ((Math.random() - 0.5) * 50) + 'deg)';
                section.appendChild(sym);
                setTimeout(() => sym.classList.add('visible'), 200 + s * 70);
            }

            // rotating symbols in background
            setInterval(() => {
                const syms = section.querySelectorAll('.support-scatter-sym');
                const pick = syms[Math.floor(Math.random() * syms.length)];
                if (pick) pick.textContent = SYMS_BG[Math.floor(Math.random() * SYMS_BG.length)];
            }, 200);

            function decryptLink(el, onDone) {
                const text = el.textContent;
                const chars = [];
                let html = '';
                for (let j = 0; j < text.length; j++) {
                    if (/\s/.test(text[j])) { html += text[j]; }
                    else {
                        html += '<span class="dc">' + SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)] + '</span>';
                        chars.push({ ch: text[j] });
                    }
                }
                el.innerHTML = html;
                el.style.opacity = '1';
                const spans = Array.from(el.querySelectorAll('.dc'));
                spans.forEach((s, k) => { s.textContent = chars[k].ch; });
                void el.offsetWidth;
                spans.forEach((s, k) => {
                    const w = s.getBoundingClientRect().width;
                    s.style.width = w + 'px';
                    s.textContent = SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)];
                });
                const order = spans.map((_, k) => k);
                for (let k = order.length - 1; k > 0; k--) {
                    const j = Math.floor(Math.random() * (k + 1));
                    [order[k], order[j]] = [order[j], order[k]];
                }
                let t = 0, maxEnd = 0;
                order.forEach(si => {
                    t += 8 + Math.random() * 25;
                    const start = t;
                    const cycles = 3 + Math.floor(Math.random() * 5);
                    const stepMs = 40 + Math.random() * 60;
                    for (let c = 0; c < cycles; c++) {
                        setTimeout(() => {
                            spans[si].textContent = SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)];
                        }, start + c * stepMs);
                    }
                    const endTime = start + cycles * stepMs;
                    if (endTime > maxEnd) maxEnd = endTime;
                    setTimeout(() => { spans[si].textContent = chars[si].ch; }, endTime);
                });
                setTimeout(() => { el.textContent = text; if (onDone) onDone(); }, maxEnd + 80);
            }

            setTimeout(() => {
                decryptLink(readEl, () => {
                    setTimeout(() => {
                        decryptLink(helpEl, () => {});
                    }, 500);
                });
            }, 250);
        }

        // ── Lawenda ↔ ~||-_^+*. decrypt loop ───────────────────────
        function lawendaDecryptLoop(el, onFirstDecryptDone) {
            const words = ['lawenda', '"~||-_^+*.'];
            let idx = 0;

            function fastDecrypt(target, onDone, speedProfile) {
                const chars = [];
                let html = '';
                for (let i = 0; i < target.length; i++) {
                    if (/\s/.test(target[i])) {
                        html += target[i];
                    } else {
                        html += '<span class="dc">' + SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)] + '</span>';
                        chars.push({ i: i, ch: target[i] });
                    }
                }
                el.innerHTML = html;
                const spans = Array.from(el.querySelectorAll('.dc'));

                // lock widths
                spans.forEach((s, i) => { s.textContent = chars[i].ch; });
                void el.offsetWidth;
                spans.forEach((s, i) => {
                    const w = s.getBoundingClientRect().width;
                    s.style.width = w + 'px';
                    s.textContent = SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)];
                });

                const order = spans.map((_, i) => i);
                for (let k = order.length - 1; k > 0; k--) {
                    const j = Math.floor(Math.random() * (k + 1));
                    [order[k], order[j]] = [order[j], order[k]];
                }

                let t = 0;
                let maxEnd = 0;
                const isSlow = speedProfile === 'slow';
                order.forEach(si => {
                    t += isSlow ? (26 + Math.random() * 54) : (5 + Math.random() * 20);
                    const start = t;
                    const cycles = isSlow ? (7 + Math.floor(Math.random() * 7)) : (3 + Math.floor(Math.random() * 5));
                    const stepMs = isSlow ? (95 + Math.random() * 120) : (50 + Math.random() * 70);
                    for (let c = 0; c < cycles; c++) {
                        setTimeout(() => {
                            spans[si].textContent = SYMS_DECRYPT[Math.floor(Math.random() * SYMS_DECRYPT.length)];
                        }, start + c * stepMs);
                    }
                    const endTime = start + cycles * stepMs;
                    if (endTime > maxEnd) maxEnd = endTime;
                    setTimeout(() => { spans[si].textContent = chars[si].ch; }, endTime);
                });

                setTimeout(() => {
                    el.textContent = target;
                    if (onDone) onDone();
                }, maxEnd + (isSlow ? 150 : 80));
            }

            function loop() {
                idx = (idx + 1) % words.length;
                fastDecrypt(words[idx], () => {
                    const pause = 1800 + Math.random() * 2000;
                    setTimeout(loop, pause);
                });
            }

            // start with slower decrypt on "lawenda"
            fastDecrypt(words[idx], () => {
                if (onFirstDecryptDone) onFirstDecryptDone();
                const initialPause = 900 + Math.random() * 700;
                setTimeout(loop, initialPause);
            }, 'slow');
        }

        // ── Parallax on scroll ───────────────────────────────────────
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (ticking) return;
            ticking = true;
            requestAnimationFrame(() => {
                document.querySelectorAll('.scatter-words').forEach(container => {
                    const rect = container.parentElement.getBoundingClientRect();
                    const progress = -rect.top * 0.03;
                    container.querySelectorAll('span').forEach((s, i) => {
                        // multi-depth parallax based on element size
                        const sizeRate = parseFloat(s.style.fontSize) / 50;
                        const rate = (0.2 + (i % 5) * 0.12) * sizeRate;
                        const y = progress * rate;
                        s.style.transform = 'rotate(' + (s._rotate || 0) + 'deg) translateY(' + y + 'px)';
                    });
                });
                ticking = false;
            });
        }, { passive: true });

        // ── "lawenda" click scrolls to support section ───────────
        document.querySelector('.lawenda-huge').addEventListener('click', function() {
            const supportSection = document.querySelector('[data-section="support"]');
            if (supportSection) {
                supportSection.scrollIntoView({ behavior: 'smooth' });
            }
        });

        // ── Współpraca toggle ──────────────────────────────────────
        document.getElementById('navCollab').addEventListener('click', function() {
            document.getElementById('navEmail').classList.toggle('open');
        });

    })();
    </script>
