    <script>
    (function() {

        // ── Constants ───────────────────────────────────────────
        const SYMS = ['_', '-', '~', '"', '|', ',', '*', '^', ':', ';', '.', '+', '=', '`', "'", '!'];
        const PREMIERE = new Date('2026-03-20');
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        const POEMS = [
            'nie ma już miejsca\nna pustej widowni\n\nzająłem wszystkie\nswoimi wersjami',
            'płytkim oddechem\nwciąż myślę o świeczce\ni o tym, że popiół\nnie czeka na płomień',
            'i dzieje się chaos\nkojący i cichy\nbo wszystko co wiem\nznika w jej oczach',
            'to co pod nimi\njest mi nieznane\n\nbo zapomniałem\njak pachnie ciągłość'
        ];
        const SECRET_POEMS = [
            'bo bez siebie\nmogę wszystko i nic\n\na ze sobą\njedynie coś pomiędzy',
            'nie ma już miejsca\nna pustej widowni\n\nzająłem wszystkie\nswoimi wersjami\ni tymi maskami\nudaję ciszę'
        ];

        // ── URL params ───────────────────────────────────────────
        const searchParams = new URLSearchParams(location.search);
        const apiToken = searchParams.get('token');
        const urlId = parseInt(searchParams.get('id'), 10) || (Math.floor(Math.random() * 999) + 1);

        // Ustaw `window.__ZNAJDKI_API_BASE__` (np. http://localhost:3100) gdy front i API są na różnych hostach.
        const ZNAJDKI_API_ROOT = (typeof window.__ZNAJDKI_API_BASE__ === 'string' ? window.__ZNAJDKI_API_BASE__ : '') + '/api/v1';

        // ── Seeded PRNG ─────────────────────────────────────────
        function mulberry32(seed) {
            let s = seed | 0;
            return function() {
                s = (s + 0x6D2B79F5) | 0;
                let t = Math.imul(s ^ (s >>> 15), 1 | s);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }
        const rng = mulberry32(urlId * 2654435761);
        function rngInt(max) { return Math.floor(rng() * max); }

        const poemIndex = rngInt(POEMS.length);
        const secretIndex = rngInt(SECRET_POEMS.length);

        // ── DOM refs ────────────────────────────────────────────
        const messagesEl = document.getElementById('messages');
        const inputArea = document.getElementById('inputArea');
        const userInput = document.getElementById('userInput');
        const scatterEl = document.getElementById('scatter');
        const burstEl = document.getElementById('burst');
        const whiteoutEl = document.getElementById('whiteout');
        const audioToggle = document.getElementById('audioToggle');

        // ── State ───────────────────────────────────────────────
        let userName = '';
        let bgStep = 0;
        const bgColors = ['#000', '#050505', '#0a0a0a', '#111'];

        // ── Utility ─────────────────────────────────────────────
        function wait(ms) {
            const actual = reducedMotion ? Math.min(ms, 150) : ms;
            return new Promise(r => setTimeout(r, actual));
        }

        function humanDelay(ch) {
            if (reducedMotion) return 8;
            let d = 28 + Math.random() * 40;
            if ('.!?'.includes(ch)) d += 200 + Math.random() * 250;
            else if (','.includes(ch)) d += 100 + Math.random() * 80;
            else if (ch === ' ') d += 20 + Math.random() * 60;
            if (Math.random() < 0.08) d += 120 + Math.random() * 200;
            return d;
        }

        function randomSym() { return SYMS[Math.floor(Math.random() * SYMS.length)]; }
        function randomSymChunk(n) { let s = ''; for (let i = 0; i < n; i++) s += randomSym(); return s; }
        function markZnajdkaTamed() {
            try { localStorage.setItem('znajdka_oswojona', '1'); } catch (e) {}
        }

        function scrollBottom() {
            messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
        }

        // ── Scatter symbols ─────────────────────────────────────
        const scatterSpans = [];
        function addScatter(count) {
            for (let i = 0; i < count; i++) {
                const s = document.createElement('span');
                s.textContent = randomSym();
                s.style.left = (5 + Math.random() * 85) + '%';
                s.style.top = (5 + Math.random() * 85) + '%';
                s.style.fontSize = (12 + Math.random() * 28) + 'px';
                s.style.transform = 'rotate(' + ((Math.random() - 0.5) * 40) + 'deg)';
                scatterEl.appendChild(s);
                scatterSpans.push(s);
                setTimeout(() => s.classList.add('visible'), 200 + i * 150);
            }
        }

        // ── Background shift ────────────────────────────────────
        function shiftBg() {
            bgStep = Math.min(bgStep + 1, bgColors.length - 1);
            document.body.style.backgroundColor = bgColors[bgStep];
        }

        // ── Typing indicator ────────────────────────────────────
        function showTyping() {
            const div = document.createElement('div');
            div.className = 'msg msg-znajdka typing-msg';
            div.innerHTML = '<span class="typing-dot">~</span><span class="typing-dot">|</span><span class="typing-dot">.</span>';
            messagesEl.appendChild(div);
            scrollBottom();

            const iv = setInterval(() => {
                div.querySelectorAll('.typing-dot').forEach(d => { d.textContent = randomSym(); });
            }, 160);

            return () => { clearInterval(iv); div.remove(); };
        }

        // ── Say (znajdka message) ───────────────────────────────
        async function say(text, opts) {
            opts = opts || {};
            const typingMs = Math.min(350 + text.length * 25, reducedMotion ? 100 : 1100);
            const removeTyping = showTyping();
            await wait(typingMs);
            removeTyping();

            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg msg-znajdka';
            const span = document.createElement('span');
            span.className = 'msg-text';
            msgDiv.appendChild(span);
            messagesEl.appendChild(msgDiv);
            scrollBottom();

            if (reducedMotion) {
                span.textContent = text;
            } else {
                for (let i = 0; i < text.length; i++) {
                    span.textContent = text.slice(0, i + 1);
                    scrollBottom();
                    await wait(humanDelay(text[i]));
                }
            }

            await wait(opts.pause != null ? opts.pause : 250);
        }

        // ── Say with decrypt effect ─────────────────────────────
        async function sayDecrypt(text) {
            const typingMs = reducedMotion ? 100 : 700;
            const removeTyping = showTyping();
            await wait(typingMs);
            removeTyping();

            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg msg-znajdka';
            const span = document.createElement('span');
            span.className = 'msg-text';
            span.textContent = text;
            msgDiv.appendChild(span);
            messagesEl.appendChild(msgDiv);
            scrollBottom();

            if (!reducedMotion) await decryptEl(span);
            await wait(400);
        }

        // ── User message ────────────────────────────────────────
        function showUserMsg(text) {
            const div = document.createElement('div');
            div.className = 'msg msg-user';
            const span = document.createElement('span');
            span.className = 'msg-text';
            span.textContent = text;
            div.appendChild(span);
            messagesEl.appendChild(div);
            scrollBottom();
        }

        // ── Idle nudge messages ──────────────────────────────────
        const NUDGES = [
            'hej, jesteś tam?',
            'halo..?',
            'nie musisz się spieszyć.',
            'czekam.',
            '...',
        ];
        let nudgeIdx = 0;

        function startNudgeTimer(cancelToken) {
            const delay = 9000 + Math.random() * 4000;
            cancelToken.timer = setTimeout(async () => {
                if (cancelToken.cancelled) return;
                const text = NUDGES[Math.min(nudgeIdx, NUDGES.length - 1)];
                nudgeIdx++;
                await say(text, { pause: 0 });
                if (!cancelToken.cancelled) startNudgeTimer(cancelToken);
            }, delay);
        }
        function stopNudge(cancelToken) {
            cancelToken.cancelled = true;
            clearTimeout(cancelToken.timer);
        }

        // ── Choices ─────────────────────────────────────────────
        function choose(options) {
            return new Promise(resolve => {
                const container = document.createElement('div');
                container.className = 'choices';
                const nudge = { cancelled: false, timer: 0 };
                startNudgeTimer(nudge);

                const iv = setInterval(() => {
                    container.querySelectorAll('.choice-sym').forEach(s => {
                        s.textContent = randomSymChunk(2);
                    });
                }, 180);

                options.forEach((text, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    const ls = document.createElement('span');
                    ls.className = 'choice-sym';
                    const rs = document.createElement('span');
                    rs.className = 'choice-sym';
                    btn.appendChild(ls);
                    btn.appendChild(document.createTextNode(' ' + text + ' '));
                    btn.appendChild(rs);

                    btn.addEventListener('click', () => {
                        stopNudge(nudge);
                        clearInterval(iv);
                        showUserMsg(text);
                        container.remove();
                        resolve(index);
                    });
                    container.appendChild(btn);
                });

                messagesEl.appendChild(container);
                scrollBottom();
            });
        }

        // ── Free text input ─────────────────────────────────────
        function ask(placeholder) {
            return new Promise(resolve => {
                const nudge = { cancelled: false, timer: 0 };
                startNudgeTimer(nudge);

                inputArea.classList.add('visible');
                userInput.placeholder = placeholder || '';
                userInput.value = '';
                setTimeout(() => userInput.focus(), 100);

                function onKey(e) {
                    if (e.key === 'Enter' && userInput.value.trim()) {
                        stopNudge(nudge);
                        const val = userInput.value.trim().slice(0, 20).toLowerCase();
                        inputArea.classList.remove('visible');
                        userInput.removeEventListener('keydown', onKey);
                        showUserMsg(val);
                        resolve(val);
                    }
                }
                userInput.addEventListener('keydown', onKey);
            });
        }

        // ── Decrypt effect ──────────────────────────────────────
        function decryptEl(el, opts) {
            opts = opts || {};
            const slow = opts.slow;
            return new Promise(resolve => {
                const text = el.textContent;
                const chars = [];
                let html = '';
                for (let i = 0; i < text.length; i++) {
                    if (/\s/.test(text[i])) {
                        html += text[i];
                    } else {
                        html += '<span class="dc">' + randomSym() + '</span>';
                        chars.push({ idx: i, ch: text[i] });
                    }
                }
                el.innerHTML = html;
                const spans = Array.from(el.querySelectorAll('.dc'));

                spans.forEach((s, i) => { s.textContent = chars[i].ch; });
                void el.offsetWidth;
                spans.forEach((s, i) => {
                    const w = s.getBoundingClientRect().width;
                    s.style.width = w + 'px';
                    s.textContent = randomSym();
                });

                const order = spans.map((_, i) => i);
                for (let k = order.length - 1; k > 0; k--) {
                    const j = Math.floor(Math.random() * (k + 1));
                    [order[k], order[j]] = [order[j], order[k]];
                }

                let t = 0;
                let maxEnd = 0;
                order.forEach(si => {
                    t += slow ? (30 + Math.random() * 60) : (5 + Math.random() * 15);
                    const start = t;
                    const cycles = slow ? (6 + Math.floor(Math.random() * 8)) : (2 + Math.floor(Math.random() * 4));
                    const stepMs = slow ? (80 + Math.random() * 100) : (40 + Math.random() * 60);
                    for (let c = 0; c < cycles; c++) {
                        setTimeout(() => { spans[si].textContent = randomSym(); }, start + c * stepMs);
                    }
                    const endTime = start + cycles * stepMs;
                    if (endTime > maxEnd) maxEnd = endTime;
                    setTimeout(() => { spans[si].textContent = chars[si].ch; }, endTime);
                });

                setTimeout(() => {
                    el.textContent = text;
                    resolve();
                }, maxEnd + 80);
            });
        }

        // ── Poem reveal ─────────────────────────────────────────
        async function showPoem(text) {
            const div = document.createElement('div');
            div.className = 'poem-reveal';
            const p = document.createElement('div');
            p.className = 'poem-text';
            p.textContent = text;
            div.appendChild(p);
            messagesEl.appendChild(div);
            scrollBottom();

            if (!reducedMotion) {
                const lines = text.split('\n');
                let html = '';
                for (let li = 0; li < lines.length; li++) {
                    if (li > 0) html += '\n';
                    for (let ci = 0; ci < lines[li].length; ci++) {
                        if (/\s/.test(lines[li][ci])) html += lines[li][ci];
                        else html += '<span class="dc">' + randomSym() + '</span>';
                    }
                }
                p.innerHTML = html;
                const spans = Array.from(p.querySelectorAll('.dc'));
                const flatChars = text.replace(/\n/g, '').replace(/\s/g, '');

                spans.forEach((s, i) => { s.textContent = flatChars[i]; });
                void p.offsetWidth;
                spans.forEach((s, i) => {
                    const w = s.getBoundingClientRect().width;
                    s.style.width = w + 'px';
                    s.textContent = randomSym();
                });

                const order = spans.map((_, i) => i);
                for (let k = order.length - 1; k > 0; k--) {
                    const j = Math.floor(Math.random() * (k + 1));
                    [order[k], order[j]] = [order[j], order[k]];
                }

                await new Promise(resolve => {
                    let t = 0, maxEnd = 0;
                    order.forEach(si => {
                        t += 25 + Math.random() * 55;
                        const start = t;
                        const cycles = 5 + Math.floor(Math.random() * 7);
                        const stepMs = 70 + Math.random() * 90;
                        for (let c = 0; c < cycles; c++) {
                            setTimeout(() => { spans[si].textContent = randomSym(); }, start + c * stepMs);
                        }
                        const endTime = start + cycles * stepMs;
                        if (endTime > maxEnd) maxEnd = endTime;
                        setTimeout(() => { spans[si].textContent = flatChars[si]; }, endTime);
                    });
                    setTimeout(() => { p.textContent = text; resolve(); }, maxEnd + 100);
                });
            }

            await wait(1500);
        }

        // ── Big reveal (~||-_^+*. → lawenda) ────────────────────
        async function showBigReveal() {
            const div = document.createElement('div');
            div.className = 'big-reveal';
            div.textContent = '"~||-_^+*.';
            messagesEl.appendChild(div);
            scrollBottom();

            if (!reducedMotion) await decryptEl(div, { slow: true });
            await wait(1800);

            document.body.classList.add('lavender-pulse');

            if (!reducedMotion) {
                const text = '"~||-_^+*.';
                const target = 'lawenda';
                const maxLen = Math.max(text.length, target.length);
                let html = '';
                for (let i = 0; i < maxLen; i++) html += '<span class="dc">' + randomSym() + '</span>';
                div.innerHTML = html;
                const spans = Array.from(div.querySelectorAll('.dc'));

                spans.forEach(s => { s.style.width = ''; });

                await new Promise(resolve => {
                    let scrambleCount = 0;
                    const scrambleIv = setInterval(() => {
                        spans.forEach(s => { s.textContent = randomSym(); });
                        scrambleCount++;
                        if (scrambleCount > 8) { clearInterval(scrambleIv); resolve(); }
                    }, 90);
                });

                while (spans.length > target.length) {
                    const last = spans.pop();
                    last.style.transition = 'opacity 0.3s';
                    last.style.opacity = '0';
                    await wait(60);
                    last.remove();
                }

                const order = spans.map((_, i) => i);
                for (let k = order.length - 1; k > 0; k--) {
                    const j = Math.floor(Math.random() * (k + 1));
                    [order[k], order[j]] = [order[j], order[k]];
                }

                await new Promise(resolve => {
                    let t = 0, maxEnd = 0;
                    order.forEach(si => {
                        t += 40 + Math.random() * 70;
                        const start = t;
                        const cycles = 5 + Math.floor(Math.random() * 6);
                        const stepMs = 75 + Math.random() * 90;
                        for (let c = 0; c < cycles; c++) {
                            setTimeout(() => { spans[si].textContent = randomSym(); }, start + c * stepMs);
                        }
                        const endTime = start + cycles * stepMs;
                        if (endTime > maxEnd) maxEnd = endTime;
                        setTimeout(() => { spans[si].textContent = target[si]; }, endTime);
                    });
                    setTimeout(resolve, maxEnd + 100);
                });
            }

            div.textContent = 'lawenda';
            div.classList.add('lavender');
            scrollBottom();
            await wait(1500);

            setTimeout(() => document.body.classList.remove('lavender-pulse'), 500);
        }

        // ── Cursor trail ────────────────────────────────────────
        function initCursorTrail() {
            let lastX = 0, lastY = 0, throttle = false;
            document.addEventListener('mousemove', e => {
                if (throttle) return;
                throttle = true;
                setTimeout(() => { throttle = false; }, 80);

                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                if (Math.abs(dx) + Math.abs(dy) < 30) return;
                lastX = e.clientX;
                lastY = e.clientY;

                const span = document.createElement('span');
                span.className = 'trail-char';
                span.textContent = randomSym();
                span.style.left = e.clientX + 'px';
                span.style.top = e.clientY + 'px';
                span.style.fontSize = (10 + Math.random() * 8) + 'px';
                document.body.appendChild(span);

                setTimeout(() => { span.style.opacity = '0'; }, 50);
                setTimeout(() => span.remove(), 600);
            });
        }

        // ── Navigate with effect (burst / whiteout / fade) ──────
        function navigateWithEffect(href, effect) {
            effect = effect || 'burst';
            if (effect === 'fade') {
                document.body.style.transition = 'opacity 1s ease';
                document.body.style.opacity = '0';
                setTimeout(function () { window.location.href = href; }, 900);
                return;
            }
            if (effect === 'whiteout') {
                whiteoutEl.style.opacity = '1';
                setTimeout(function () { window.location.href = href; }, 1200);
                return;
            }
            if (effect === 'none') {
                window.location.href = href;
                return;
            }
            var cx = window.innerWidth / 2;
            var cy = window.innerHeight / 2;
            burstEl.style.display = 'block';

            for (var i = 0; i < 120; i++) {
                var s = document.createElement('span');
                s.textContent = randomSym();
                s.style.left = cx + 'px';
                s.style.top = cy + 'px';
                s.style.fontSize = (10 + Math.random() * 24) + 'px';
                s.style.opacity = '0.7';
                s.style.transition = 'all 1.4s cubic-bezier(0.16, 1, 0.3, 1)';
                burstEl.appendChild(s);

                var angle = Math.random() * Math.PI * 2;
                var dist = 200 + Math.random() * 600;
                var tx = cx + Math.cos(angle) * dist;
                var ty = cy + Math.sin(angle) * dist;

                (function (span, tox, toy) {
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            span.style.left = tox + 'px';
                            span.style.top = toy + 'px';
                            span.style.opacity = '0';
                            span.style.transform = 'rotate(' + ((Math.random() - 0.5) * 360) + 'deg) scale(0.3)';
                        });
                    });
                })(s, tx, ty);
            }

            setTimeout(function () {
                whiteoutEl.style.opacity = '1';
            }, 600);

            setTimeout(function () {
                window.location.href = href;
            }, 1900);
        }

        function transitionToIndex() {
            navigateWithEffect('index.html', 'burst');
        }

        // ── znajdki-backend API (token z ?token=) ─────────────────
        async function apiFetch(path, options) {
            options = options || {};
            var headers = Object.assign({}, options.headers || {});
            if (options.body) {
                headers['Content-Type'] = 'application/json';
            }
            var init = {
                method: options.method || 'GET',
                headers: headers,
            };
            if (options.body) init.body = options.body;
            var res = await fetch(ZNAJDKI_API_ROOT + path, init);
            var data = await res.json().catch(function () { return {}; });
            if (!res.ok) {
                var msg = data.message || data.error || res.statusText || 'błąd sieci';
                throw new Error(msg);
            }
            return data;
        }

        function transitionKeyToDecision(key) {
            if (key === 'transition_go_deeper') return 'go_deeper';
            if (key === 'transition_return_start') return 'return_start';
            if (key === 'transition_keep_fragment') return 'keep_fragment';
            return 'go_deeper';
        }

        async function finalizeEncounterOutcome(encounterId, transitionStep) {
            var decision = transitionKeyToDecision(transitionStep.key);
            var out = await apiFetch('/encounter/' + encounterId + '/outcome', {
                method: 'POST',
                body: JSON.stringify({ decision: decision }),
            });
            var href = out.target_url || transitionStep.target_url || 'index.html';
            var effect = (transitionStep.ui_hints && transitionStep.ui_hints.transition_effect) || 'burst';
            if (out.message) {
                await say(out.message, { pause: 900 });
            }
            navigateWithEffect(href, effect);
        }

        async function startApiEncounter(token) {
            var serialEl = document.getElementById('znajdkaSerial');
            var encounterId;
            var started;

            try {
                var meta = await apiFetch('/artifact/' + encodeURIComponent(token));
                if (serialEl) {
                    serialEl.textContent =
                        String(meta.serial_number).padStart(2, '0') + '/' + String(meta.series.total);
                    serialEl.hidden = false;
                    serialEl.removeAttribute('aria-hidden');
                }
            } catch (e) {
                console.warn('znajdka: artifact meta', e);
            }

            try {
                started = await apiFetch('/artifact/' + encodeURIComponent(token) + '/encounter', {
                    method: 'POST',
                });
                encounterId = started.encounter_id;
            } catch (e) {
                await say('nie mogę się połączyć z serwerem znajdki. spróbuj później.', { pause: 600 });
                console.error(e);
                return;
            }

            if (!reducedMotion) initCursorTrail();
            audioToggle.classList.add('show');

            var step = started.step;

            while (step) {
                if (step.type === 'message') {
                    await say(step.text, { pause: (step.ui_hints && step.ui_hints.pause_ms) != null ? step.ui_hints.pause_ms : 250 });
                    var advMsg = await apiFetch('/encounter/' + encounterId);
                    step = advMsg.step;
                    continue;
                }

                if (step.type === 'choice') {
                    if (step.text) {
                        await say(step.text, { pause: (step.ui_hints && step.ui_hints.pause_ms) != null ? step.ui_hints.pause_ms : 600 });
                    }
                    var labels = step.options.map(function (o) { return o.label; });
                    var idx = await choose(labels);
                    var ans = await apiFetch('/encounter/' + encounterId + '/answer', {
                        method: 'POST',
                        body: JSON.stringify({
                            step_key: step.key,
                            answer_type: 'choice',
                            value: String(idx),
                        }),
                    });
                    step = ans.step;
                    if (step && step.type === 'transition') {
                        await finalizeEncounterOutcome(encounterId, step);
                        return;
                    }
                    continue;
                }

                if (step.type === 'reveal') {
                    var revealData = await apiFetch('/encounter/' + encounterId + '/reveal');
                    await showPoem(revealData.content);
                    var advRev = await apiFetch('/encounter/' + encounterId);
                    step = advRev.step;
                    continue;
                }

                if (step.type === 'transition') {
                    await finalizeEncounterOutcome(encounterId, step);
                    return;
                }

                console.warn('znajdka: nieznany krok', step);
                break;
            }
        }

        // ── Show subtle link ────────────────────────────────────
        function showLink(text, href) {
            const div = document.createElement('div');
            div.className = 'msg msg-znajdka';
            const a = document.createElement('a');
            a.className = 'subtle-link';
            a.href = href;
            a.textContent = text;
            div.appendChild(a);
            messagesEl.appendChild(div);
            scrollBottom();
        }

            markZnajdkaTamed();

            await say('mogę cię zabrać do reszty.');
            await say('do wszystkich wierszy.', { pause: 800 });
            await say('ale wtedy ta rozmowa się skończy.');

        // ── Start ───────────────────────────────────────────────
        async function start() {
            if (apiToken) {
                await wait(1200);
                await startApiEncounter(apiToken);
                return;
            }
            if (!reducedMotion) initCursorTrail();
            await wait(2000);
            await act1();
            await act2();
            await act3();
            await act4();
            await act5();
        }

        start();

    })();
