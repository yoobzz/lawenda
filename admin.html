<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>panel — dodaj wiersz</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif; margin: 24px; }
        label { display:block; margin: 12px 0 6px; font-weight: 600; }
        input[type=text], textarea { width: 100%; max-width: 820px; padding: 10px; font: inherit; }
        textarea { height: 320px; }
        button { margin-top: 16px; padding: 10px 14px; font: inherit; cursor: pointer; }
        .hint { color: #666; font-size: 12px; margin-top: 4px; }
        .ok { color: #0a7d2e; }
        .err { color: #b00020; }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        hr { margin: 32px 0; border: none; border-top: 1px solid #ddd; }
        table { border-collapse: collapse; width: 100%; max-width: 900px; font-size: 13px; margin-top: 12px; }
        th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #eee; }
        th { background: #f5f5f5; font-weight: 600; }
        tr:hover td { background: #fafafa; }
    </style>
    <script>
    async function submitPoem(e) {
        e.preventDefault();
        const poemTitle = document.getElementById('poemTitle').value;
        const poemText = document.getElementById('poemText').value;
        const token = localStorage.getItem('adminToken') || '';
        const resp = await fetch('/api/add-poem', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ poemTitle, poemText })
        });
        const out = document.getElementById('out');
        if (resp.ok) {
            const data = await resp.json();
            out.innerHTML = `<span class="ok">OK:</span> ${data.message || 'dodano'}`;
        } else {
            const err = await resp.json().catch(() => ({}));
            out.innerHTML = `<span class="err">Błąd:</span> ${err.error || resp.status}`;
        }
    }
    function saveToken() {
        const t = document.getElementById('token').value.trim();
        localStorage.setItem('adminToken', t);
        document.getElementById('tokInfo').textContent = t ? 'zapisano' : 'usunięto';
    }
    async function loadScans() {
        const token = localStorage.getItem('adminToken') || '';
        const out = document.getElementById('scansOut');
        out.textContent = 'ładuję...';
        try {
            const resp = await fetch('/api/admin/scans', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!resp.ok) { out.textContent = 'błąd: ' + resp.status; return; }
            const { scans } = await resp.json();
            if (!scans || scans.length === 0) { out.textContent = 'brak skanów'; return; }
            const rows = scans.map(s => {
                const d = new Date(s.at);
                const date = d.toLocaleString('pl-PL', { dateStyle: 'short', timeStyle: 'short' });
                const locText = [s.city, s.country].filter(x => x && x !== '?').join(', ') || '?';
                const loc = (s.lat && s.lng)
                    ? `<a href="https://www.google.com/maps?q=${s.lat},${s.lng}" target="_blank" rel="noopener" title="${s.lat}, ${s.lng}">${locText} 📍</a>`
                    : locText;
                const state = s.state === 'first' ? '★ pierwsza' : s.state === 'known' ? '↩ powrót' : '⇄ transfer';
                const ua = (s.ua || '').replace(/</g, '&lt;');
                return `<tr><td><input type="checkbox" class="code-cb" value="${s.code}"></td><td>${date}</td><td><b>${s.code}</b></td><td>${state}</td><td>${loc}</td><td class="hint" title="${ua}">${detectDevice(s.ua)}</td></tr>`;
            }).join('');
            out.innerHTML = `
                <div style="margin-bottom:8px;display:flex;gap:8px;align-items:center;">
                    <button type="button" onclick="selectAll()">zaznacz wszystkie</button>
                    <button type="button" onclick="releaseSelected()" style="background:#b00020;color:#fff;border:none;padding:8px 12px;cursor:pointer;font:inherit;">porzuć zaznaczone</button>
                    <span id="releaseStatus" style="font-size:12px;color:#555;"></span>
                </div>
                <table><thead><tr><th></th><th>kiedy</th><th>kod</th><th>stan</th><th>skąd</th><th>urządzenie</th></tr></thead><tbody>${rows}</tbody></table>`;
        } catch (e) {
            out.textContent = 'błąd: ' + e.message;
        }
    }
    function detectDevice(ua) {
        if (!ua) return '?';
        if (/iPhone|iPad/i.test(ua)) return 'iOS';
        if (/Android/i.test(ua)) return 'Android';
        if (/Mac/i.test(ua)) return 'Mac';
        if (/Windows/i.test(ua)) return 'Windows';
        return 'inne';
    }
    function selectAll() {
        document.querySelectorAll('.code-cb').forEach(cb => cb.checked = true);
    }
    async function releaseSelected() {
        const status = document.getElementById('releaseStatus');
        const codes = [...new Set(
            Array.from(document.querySelectorAll('.code-cb:checked')).map(cb => cb.value)
        )];
        if (codes.length === 0) {
            status.textContent = '← zaznacz kody checkboxami';
            status.style.color = '#b00020';
            return;
        }
        const confirmEl = document.getElementById('releaseConfirm');
        confirmEl.style.display = 'block';
        confirmEl.innerHTML = `Porzucić <b>${codes.length}</b> kod(ów): <b>${codes.join(', ')}</b>?
            <button onclick="doRelease(${JSON.stringify(codes)})" style="margin-left:8px;background:#b00020;color:#fff;border:none;padding:4px 10px;cursor:pointer;font:inherit;">tak, porzuć</button>
            <button onclick="document.getElementById('releaseConfirm').style.display='none'" style="margin-left:4px;padding:4px 10px;cursor:pointer;font:inherit;">anuluj</button>`;
    }
    async function doRelease(codes) {
        document.getElementById('releaseConfirm').style.display = 'none';
        const status = document.getElementById('releaseStatus');
        status.style.color = '#555';
        status.textContent = 'porzucam...';
        const token = localStorage.getItem('adminToken') || '';
        try {
            const resp = await fetch('/api/admin/release-codes', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ codes })
            });
            const data = await resp.json();
            if (!resp.ok) { status.style.color='#b00020'; status.textContent = 'błąd: ' + (data.error || resp.status); return; }
            const ok = data.results.filter(r => r.ok).map(r => r.code);
            status.style.color = '#0a7d2e';
            status.textContent = `✓ porzucono: ${ok.join(', ')}`;
            setTimeout(loadScans, 800);
        } catch (e) {
            status.style.color = '#b00020';
            status.textContent = 'błąd: ' + e.message;
        }
    }
    </script>
    </head>
<body>
    <h1>Dodaj wiersz</h1>
    <p class="mono">Bearer token: <input type="password" id="token" placeholder="wklej ADMIN_TOKEN" oninput="saveToken()" /> <span id="tokInfo" class="hint"></span></p>
    <form onsubmit="submitPoem(event)">
        <label for="poemTitle">Tytuł (opcjonalnie)</label>
        <input type="text" id="poemTitle" name="poemTitle" placeholder="np. po pełni" />
        <div class="hint">Tytuł zapisywany jest jako komentarz w poems.html.</div>

        <label for="poemText">Treść wiersza</label>
        <textarea id="poemText" name="poemText" placeholder="Wpisz wiersz. Nowe linie zostaną zapisane jako &lt;br&gt;."></textarea>
        <div class="hint">Zachowaj puste linie tam, gdzie chcesz przerwę akapitową.</div>

        <button type="submit">Dodaj</button>
    </form>
    <p id="out" class="mono"></p>
    <p class="hint">Po dodaniu odśwież <a href="/poems.html" target="_blank" rel="noopener">poems.html</a> i <a href="/index.html" target="_blank" rel="noopener">index.html</a>.</p>

    <hr>
    <h2>Skany znajdek</h2>
    <button type="button" onclick="loadScans()">odśwież skany</button>
    <div id="releaseConfirm" style="display:none;margin-top:10px;padding:10px;background:#fff3cd;border:1px solid #ffc107;font-size:13px;max-width:700px;"></div>
    <div id="scansOut" class="mono" style="margin-top:12px;font-size:13px;"></div>
</body>
</html>
